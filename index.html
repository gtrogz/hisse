<!DOCTYPE html>
<html lang="tr" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Pro Hisse Tarayıcı — NASDAQ tema hisseleri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.js"></script>
<style>
/* ==========================================================
   DESIGN TOKENS
   ========================================================== */
:root {
  /* Spacing scale (8px grid) */
  --s-1: 4px;  --s-2: 8px;  --s-3: 12px; --s-4: 16px;
  --s-5: 24px; --s-6: 32px; --s-7: 48px; --s-8: 64px;

  /* Type scale */
  --fs-xs: 11px; --fs-sm: 12px; --fs-base: 14px; --fs-md: 16px;
  --fs-lg: 20px; --fs-xl: 28px; --fs-2xl: 36px;

  /* Radii */
  --r-sm: 8px;  --r-md: 12px; --r-lg: 16px; --r-xl: 24px;
  --r-pill: 999px;

  /* Theme accent colors (4 temalar) */
  --c-ai: #a78bfa;     /* Lavanta */
  --c-bt: #34d399;     /* Mint */
  --c-ce: #fbbf24;     /* Amber */
  --c-qc: #22d3ee;     /* Sky */

  /* Transitions */
  --t-fast: 150ms cubic-bezier(.4,0,.2,1);
  --t-base: 200ms cubic-bezier(.4,0,.2,1);
  --t-slow: 300ms cubic-bezier(.4,0,.2,1);
}

/* DARK (default) */
[data-theme="dark"] {
  --bg:        #0a0e1a;
  --bg-elev:   #131826;
  --bg-soft:   #1c2333;
  --bg-glass:  rgba(19, 24, 38, 0.85);
  --fg:        #f1f5f9;
  --fg-soft:   #cbd5e1;
  --fg-muted:  #94a3b8;
  --fg-faint:  #64748b;
  --line:      #1f2937;
  --line-soft: rgba(148, 163, 184, 0.1);
  --primary:   #7dd3fc;
  --accent:    #c4b5fd;
  --up:        #34d399;
  --up-bg:     rgba(52, 211, 153, 0.12);
  --down:      #fb7185;
  --down-bg:   rgba(251, 113, 133, 0.12);
  --warn:      #fbbf24;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.2);
  --shadow-md: 0 4px 6px rgba(0,0,0,.4), 0 2px 4px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.5), 0 4px 10px rgba(0,0,0,.3);
}

/* LIGHT */
[data-theme="light"] {
  --bg:        #fafaf7;
  --bg-elev:   #ffffff;
  --bg-soft:   #f5f5f0;
  --bg-glass:  rgba(255, 255, 255, 0.85);
  --fg:        #1c1917;
  --fg-soft:   #44403c;
  --fg-muted:  #78716c;
  --fg-faint:  #a8a29e;
  --line:      #e7e5e4;
  --line-soft: rgba(120, 113, 108, 0.08);
  --primary:   #0c4a6e;
  --accent:    #7c3aed;
  --up:        #059669;
  --up-bg:     rgba(5, 150, 105, 0.1);
  --down:      #e11d48;
  --down-bg:   rgba(225, 29, 72, 0.1);
  --warn:      #d97706;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.06);
  --shadow-md: 0 4px 8px rgba(0,0,0,.06), 0 2px 4px rgba(0,0,0,.05);
  --shadow-lg: 0 10px 25px rgba(0,0,0,.08), 0 4px 10px rgba(0,0,0,.06);
}

/* ==========================================================
   RESET & BASE
   ========================================================== */
*, *::before, *::after { box-sizing: border-box; }
html { -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: var(--fs-base);
  font-feature-settings: 'cv11', 'ss03';
  background: var(--bg);
  color: var(--fg);
  line-height: 1.5;
  transition: background var(--t-base), color var(--t-base);
}
button, input, select { font: inherit; color: inherit; }
button { background: none; border: 0; cursor: pointer; padding: 0; }
a { color: inherit; text-decoration: none; }
img, svg { display: block; max-width: 100%; }

/* Tabular numerics for prices */
.tabular { font-variant-numeric: tabular-nums; }

/* ==========================================================
   LAYOUT
   ========================================================== */
.container {
  max-width: 1280px;
  margin: 0 auto;
  padding: 0 var(--s-6);
}
@media (max-width: 720px) {
  .container { padding: 0 var(--s-4); }
}

/* ==========================================================
   STICKY HEADER
   ========================================================== */
.topbar {
  position: sticky;
  top: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: var(--s-4);
  padding: var(--s-3) var(--s-6);
  background: var(--bg-glass);
  backdrop-filter: saturate(180%) blur(12px);
  -webkit-backdrop-filter: saturate(180%) blur(12px);
  border-bottom: 1px solid var(--line);
}
.logo {
  font-size: var(--fs-md);
  font-weight: 800;
  letter-spacing: -0.02em;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--fg);
}
.logo .diamond {
  display: inline-block;
  width: 14px;
  height: 14px;
  background: linear-gradient(135deg, var(--accent), var(--primary));
  transform: rotate(45deg);
  border-radius: 3px;
}
.markets {
  display: flex;
  gap: var(--s-1);
  background: var(--bg-soft);
  padding: 4px;
  border-radius: var(--r-pill);
  margin-left: var(--s-4);
}
.market-link {
  padding: 6px 14px;
  border-radius: var(--r-pill);
  font-size: var(--fs-sm);
  font-weight: 600;
  color: var(--fg-muted);
  transition: var(--t-fast);
}
.market-link:hover { color: var(--fg); }
.market-link.active {
  background: var(--bg-elev);
  color: var(--fg);
  box-shadow: var(--shadow-sm);
}
.spacer { flex: 1; }
.topbar-actions {
  display: flex;
  align-items: center;
  gap: var(--s-2);
}
.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: var(--r-md);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  color: var(--fg-muted);
  background: transparent;
  transition: var(--t-fast);
}
.icon-btn:hover {
  background: var(--bg-soft);
  color: var(--fg);
}
.search-trigger {
  display: inline-flex;
  align-items: center;
  gap: var(--s-2);
  padding: 8px 14px;
  background: var(--bg-soft);
  border-radius: var(--r-md);
  color: var(--fg-muted);
  font-size: var(--fs-sm);
  transition: var(--t-fast);
  min-width: 220px;
  justify-content: space-between;
}
.search-trigger:hover { color: var(--fg); }
.search-trigger kbd {
  font-family: inherit;
  font-size: 11px;
  background: var(--bg-elev);
  padding: 2px 6px;
  border-radius: 4px;
  border: 1px solid var(--line);
  color: var(--fg-faint);
}
@media (max-width: 720px) {
  .search-trigger { min-width: 0; padding: 8px 10px; }
  .search-trigger .placeholder, .search-trigger kbd { display: none; }
}

/* ==========================================================
   HERO
   ========================================================== */
.hero {
  padding: var(--s-7) 0 var(--s-6);
}
.hero h1 {
  margin: 0 0 var(--s-2);
  font-size: var(--fs-2xl);
  font-weight: 800;
  letter-spacing: -0.025em;
  color: var(--fg);
}
.hero .subtitle {
  margin: 0 0 var(--s-6);
  font-size: var(--fs-md);
  color: var(--fg-muted);
}
@media (max-width: 720px) {
  .hero h1 { font-size: var(--fs-xl); }
}

/* ==========================================================
   THEME CARDS GRID (4 cards)
   ========================================================== */
.theme-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: var(--s-4);
}
@media (max-width: 1024px) { .theme-grid { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 480px)  { .theme-grid { grid-template-columns: 1fr; } }

.theme-card {
  position: relative;
  display: block;
  text-align: left;
  padding: var(--s-5);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: var(--t-base);
  overflow: hidden;
}
.theme-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, var(--theme-color, transparent) 0%, transparent 50%);
  opacity: 0.08;
  pointer-events: none;
  transition: opacity var(--t-base);
}
.theme-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--theme-color);
}
.theme-card:hover::before { opacity: 0.16; }
.theme-card.active {
  border-color: var(--theme-color);
  border-width: 2px;
  padding: calc(var(--s-5) - 1px);
}
.theme-card.active::before { opacity: 0.2; }
.theme-card .check {
  position: absolute;
  top: var(--s-3);
  right: var(--s-3);
  width: 22px;
  height: 22px;
  border-radius: 50%;
  background: var(--theme-color);
  color: #0a0e1a;
  display: none;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 12px;
}
.theme-card.active .check { display: inline-flex; }
.theme-card .emoji {
  font-size: 28px;
  line-height: 1;
  margin-bottom: var(--s-3);
}
.theme-card .name {
  font-size: var(--fs-sm);
  font-weight: 700;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--theme-color);
  margin-bottom: var(--s-3);
}
.theme-card .count {
  font-size: var(--fs-xl);
  font-weight: 800;
  letter-spacing: -0.02em;
  color: var(--fg);
  font-variant-numeric: tabular-nums;
}
.theme-card .count-label {
  font-size: var(--fs-sm);
  color: var(--fg-muted);
  margin-bottom: var(--s-3);
}
.theme-card .avg {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: var(--r-pill);
  font-size: var(--fs-xs);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  margin-bottom: var(--s-2);
}
.theme-card .avg.up { background: var(--up-bg); color: var(--up); }
.theme-card .avg.down { background: var(--down-bg); color: var(--down); }
.theme-card .top {
  font-size: var(--fs-sm);
  color: var(--fg-soft);
  margin-bottom: var(--s-2);
  font-weight: 600;
}
.theme-card .top .pct {
  font-variant-numeric: tabular-nums;
  margin-left: 4px;
}
.theme-card .updown {
  font-size: var(--fs-xs);
  color: var(--fg-faint);
  display: flex;
  gap: 8px;
}
.theme-card .updown .u { color: var(--up); }
.theme-card .updown .d { color: var(--down); }

/* Theme card colors */
.theme-card[data-key="AI"] { --theme-color: var(--c-ai); }
.theme-card[data-key="BT"] { --theme-color: var(--c-bt); }
.theme-card[data-key="CE"] { --theme-color: var(--c-ce); }
.theme-card[data-key="QC"] { --theme-color: var(--c-qc); }

/* ==========================================================
   RECOMMENDATIONS
   ========================================================== */
.recos {
  margin-top: var(--s-7);
}
.recos h2 {
  margin: 0 0 var(--s-4);
  font-size: var(--fs-lg);
  font-weight: 700;
  letter-spacing: -0.015em;
  color: var(--fg);
  display: flex;
  align-items: center;
  gap: var(--s-2);
}
.reco-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--s-4);
}
@media (max-width: 720px) { .reco-grid { grid-template-columns: 1fr; } }

.reco-card {
  text-align: left;
  padding: var(--s-5);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: var(--t-base);
  position: relative;
}
.reco-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}
.reco-card.active {
  border-color: var(--accent);
  border-width: 2px;
  padding: calc(var(--s-5) - 1px);
  background: linear-gradient(135deg, transparent, rgba(196, 181, 253, 0.06));
}
.reco-card .reco-icon {
  font-size: 24px;
  margin-bottom: var(--s-3);
}
.reco-card .reco-title {
  font-size: var(--fs-md);
  font-weight: 700;
  letter-spacing: -0.01em;
  margin-bottom: var(--s-2);
}
.reco-card .reco-desc {
  font-size: var(--fs-sm);
  color: var(--fg-muted);
  margin-bottom: var(--s-3);
  line-height: 1.5;
}
.reco-card .reco-count {
  font-size: var(--fs-sm);
  color: var(--fg-soft);
  font-weight: 600;
}
.reco-card .reco-count strong {
  color: var(--fg);
  font-size: var(--fs-md);
  margin-right: 4px;
}

/* ==========================================================
   RESULTS SECTION
   ========================================================== */
.results {
  margin-top: var(--s-7);
  margin-bottom: var(--s-8);
}
.results-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-wrap: wrap;
  gap: var(--s-3);
  margin-bottom: var(--s-5);
  padding-bottom: var(--s-4);
  border-bottom: 1px solid var(--line);
}
.results-title {
  font-size: var(--fs-lg);
  font-weight: 700;
  letter-spacing: -0.015em;
  display: flex;
  align-items: center;
  gap: var(--s-3);
}
.results-title .badge-count {
  font-size: var(--fs-xs);
  font-weight: 700;
  background: var(--bg-soft);
  color: var(--fg-soft);
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-variant-numeric: tabular-nums;
}
.results-title .badge-avg {
  font-size: var(--fs-xs);
  font-weight: 700;
  padding: 4px 10px;
  border-radius: var(--r-pill);
  font-variant-numeric: tabular-nums;
}
.results-title .badge-avg.up { background: var(--up-bg); color: var(--up); }
.results-title .badge-avg.down { background: var(--down-bg); color: var(--down); }

.sort-select {
  padding: 8px 14px;
  border-radius: var(--r-md);
  border: 1px solid var(--line);
  background: var(--bg-elev);
  color: var(--fg);
  font-size: var(--fs-sm);
  font-weight: 500;
  cursor: pointer;
  transition: var(--t-fast);
}
.sort-select:hover { border-color: var(--accent); }

/* Empty state */
.empty-state {
  text-align: center;
  padding: var(--s-8) var(--s-4);
  color: var(--fg-muted);
}
.empty-state .icon {
  font-size: 48px;
  margin-bottom: var(--s-3);
  opacity: 0.5;
}
.empty-state h3 {
  margin: 0 0 var(--s-2);
  font-size: var(--fs-lg);
  font-weight: 600;
  color: var(--fg);
}
.empty-state p {
  margin: 0;
  font-size: var(--fs-base);
}

/* ==========================================================
   STOCK GRID
   ========================================================== */
.stock-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: var(--s-4);
}

.stock-card {
  position: relative;
  display: flex;
  flex-direction: column;
  padding: var(--s-5);
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-lg);
  cursor: pointer;
  transition: var(--t-base);
  overflow: hidden;
}
.stock-card:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow-md);
  border-color: var(--accent);
}
.stock-card .head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  gap: var(--s-2);
  margin-bottom: var(--s-3);
}
.stock-card .sym {
  font-family: 'Inter', monospace;
  font-size: var(--fs-lg);
  font-weight: 800;
  letter-spacing: -0.02em;
  line-height: 1;
}
.stock-card .name {
  font-size: var(--fs-xs);
  color: var(--fg-muted);
  margin-top: 4px;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 200px;
}
.stock-card .theme-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 8px;
}
.stock-card[data-theme="AI"] .theme-dot { background: var(--c-ai); }
.stock-card[data-theme="BT"] .theme-dot { background: var(--c-bt); }
.stock-card[data-theme="CE"] .theme-dot { background: var(--c-ce); }
.stock-card[data-theme="QC"] .theme-dot { background: var(--c-qc); }

.stock-card .price-row {
  display: flex;
  align-items: baseline;
  gap: var(--s-3);
  margin-bottom: var(--s-3);
}
.stock-card .price {
  font-size: var(--fs-xl);
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  color: var(--fg);
}
.stock-card .change {
  font-size: var(--fs-sm);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  padding: 3px 8px;
  border-radius: var(--r-pill);
}
.stock-card .change.up { background: var(--up-bg); color: var(--up); }
.stock-card .change.down { background: var(--down-bg); color: var(--down); }

.stock-card .spark {
  height: 36px;
  margin-bottom: var(--s-3);
  display: flex;
  align-items: stretch;
}

.stock-card .kpi-row {
  display: flex;
  justify-content: space-between;
  gap: var(--s-3);
  font-size: var(--fs-xs);
  color: var(--fg-muted);
  margin-bottom: var(--s-3);
}
.stock-card .kpi {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.stock-card .kpi b {
  color: var(--fg-soft);
  font-weight: 700;
  font-size: var(--fs-sm);
  font-variant-numeric: tabular-nums;
}

.stock-card .footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--s-2);
  padding-top: var(--s-3);
  border-top: 1px solid var(--line-soft);
  font-size: var(--fs-xs);
}
.stock-card .score-pill {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 3px 8px;
  border-radius: var(--r-pill);
  background: var(--bg-soft);
  color: var(--fg-soft);
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.stock-card .score-pill.high { background: var(--up-bg); color: var(--up); }
.stock-card .score-pill.mid  { background: rgba(251, 191, 36, 0.12); color: var(--warn); }
.stock-card .score-pill.low  { background: var(--down-bg); color: var(--down); }
.stock-card .ob-dot {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: var(--fs-xs);
  color: var(--fg-muted);
  font-weight: 600;
}
.stock-card .ob-dot::before {
  content: '';
  width: 8px;
  height: 8px;
  border-radius: 50%;
  display: inline-block;
}
.stock-card .ob-dot.ob-0::before { background: var(--up); }
.stock-card .ob-dot.ob-1::before { background: #84cc16; }
.stock-card .ob-dot.ob-2::before { background: var(--warn); }
.stock-card .ob-dot.ob-3::before { background: #f97316; }
.stock-card .ob-dot.ob-4::before { background: var(--down); }
.stock-card .ob-dot.ob-na::before { background: var(--fg-faint); }

/* Placeholder stock card (no live data yet) */
.stock-card.placeholder .price { opacity: 0.3; }
.stock-card.placeholder .change { opacity: 0.3; }

/* Load more */
.load-more {
  display: block;
  margin: var(--s-6) auto 0;
  padding: 12px 24px;
  background: var(--bg-elev);
  border: 1px solid var(--line);
  border-radius: var(--r-md);
  color: var(--fg-soft);
  font-size: var(--fs-sm);
  font-weight: 600;
  transition: var(--t-fast);
}
.load-more:hover {
  background: var(--bg-soft);
  color: var(--fg);
}

/* ==========================================================
   SEARCH OVERLAY
   ========================================================== */
.search-overlay {
  position: fixed;
  inset: 0;
  z-index: 100;
  background: rgba(0, 0, 0, 0.5);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding-top: 12vh;
  animation: fadeIn 0.15s ease;
}
[hidden] { display: none !important; }
.search-box {
  width: 90%;
  max-width: 600px;
  background: var(--bg-elev);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-lg);
  overflow: hidden;

}

.modal {

  inset: 0;
  z-index: 80;
  background: rgba(0, 0, 0, 0.6);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--s-4);
  animation: fadeIn 0.15s ease;
}
.modal-content {
  width: 100%;
  max-width: 1100px;

  justify-content: center;

.modal-header {

  font-size: var(--fs-md);
  color: var(--fg-muted);

}

  align-items: baseline;
  gap: var(--s-3);
}
.modal-header .price {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
}
.modal-header .change {

}
.chart-canvas-wrap { flex: 1; position: relative; }

/* ============================================================
   FORMATTERS
   ============================================================ */
function fmtPrice(p, ccy = 'USD') {
  if (p == null || isNaN(p)) return '—';
  const sym = ccy === 'TRY' ? '₺' : '$';
  const d = Math.abs(p) < 1 ? 4 : 2;
  return sym + p.toLocaleString('tr-TR', { minimumFractionDigits: d, maximumFractionDigits: d });
}
function fmtMoney(n, ccy = 'USD') {
  if (n == null) return '—';
  const sym = ccy === 'TRY' ? '₺' : '$';
  const a = Math.abs(n);
  if (a >= 1e12) return sym + (n / 1e12).toFixed(2) + 'T';
  if (a >= 1e9) return sym + (n / 1e9).toFixed(2) + 'B';
  if (a >= 1e6) return sym + (n / 1e6).toFixed(1) + 'M';
  if (a >= 1e3) return sym + (n / 1e3).toFixed(0) + 'K';
  return sym + Math.round(n);
}
function fmtPct(n, dec = 2) {
  if (n == null || isNaN(n)) return '—';
  return (n >= 0 ? '+' : '') + (+n).toFixed(dec) + '%';
}
function fmtNum(n, abbr = false) {
  if (n == null || isNaN(n)) return '—';
  if (abbr) {
    const a = Math.abs(n);
    if (a >= 1e9) return (n / 1e9).toFixed(2) + 'B';
    if (a >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (a >= 1e3) return (n / 1e3).toFixed(0) + 'K';
    return Math.round(n).toString();
  }
  return n.toLocaleString('tr-TR');
}

/* ============================================================
   TECHNICAL CALCS — overbought score
   ============================================================ */
function calcRSI(closes, period = 14) {
  if (!closes || closes.length < period + 1) return null;
  const arr = closes.slice(-(period + 1));
  let gains = 0, losses = 0;
  for (let i = 1; i < arr.length; i++) {
    const d = arr[i] - arr[i - 1];
    if (d >= 0) gains += d; else losses -= d;
  }
  const ag = gains / period, al = losses / period;
  if (ag === 0 && al === 0) return 50;
  if (al === 0) return 100;
  return +(100 - 100 / (1 + ag / al)).toFixed(1);
}
function calcSMA(closes, period) {
  if (!closes || closes.length < period) return null;
  const slice = closes.slice(-period);
  return slice.reduce((a, b) => a + b, 0) / period;
}
function calcReturn(closes, daysBack) {
  if (!closes || closes.length < daysBack + 1) return null;
  const last = closes[closes.length - 1];
  const past = closes[closes.length - 1 - daysBack];
  if (!past) return null;
  return ((last - past) / past) * 100;
}
function calcOverbought(r, f) {
  const closes = (r && r.cl && r.cl.length) ? r.cl : (r && r.sp ? r.sp : []);
  const px = (r && r.p) || (closes.length ? closes[closes.length - 1] : null);
  const rsi = calcRSI(closes, 14);
  const ma200 = calcSMA(closes, 200);
  const maRatio = (ma200 && px) ? px / ma200 : null;
  const pe = (r && r.pe != null) ? r.pe : (f && f.pe != null ? f.pe : null);
  const r3m = calcReturn(closes, 63);

  const flags = [
    { k: 'rsi',  hot: rsi != null && rsi > 70,           na: rsi == null,     val: rsi },
    { k: 'ma',   hot: maRatio != null && maRatio > 1.30, na: maRatio == null, val: maRatio },
    { k: 'pe',   hot: pe != null && pe > 30,             na: pe == null,      val: pe },
    { k: 'r3m',  hot: r3m != null && r3m > 50,           na: r3m == null,     val: r3m },
  ];
  const score = flags.filter(x => x.hot).length;
  const validCount = flags.filter(x => !x.na).length;
  let cls;
  if (validCount === 0) cls = 'ob-na';
  else if (score === 0) cls = 'ob-0';
  else if (score === 1) cls = 'ob-1';
  else if (score === 2) cls = 'ob-2';
  else if (score === 3) cls = 'ob-3';
  else cls = 'ob-4';
  return { score, max: 4, cls, flags, rsi, ma200, maRatio, pe, r3m, validCount };
}

/* ============================================================
   FUNDAMENTAL SCORE (10 criteria, hybrid)
   ============================================================ */
const CRITERIA = [
  { k: 'ni',     label: 'Kârlı Şirket',    test: (r,f) => (r.eps != null && r.eps > 0) || (f.ni != null && f.ni > 0) },
  { k: 'pm',     label: 'Net Marj +',      test: (r,f) => f.pm != null && f.pm > 0 },
  { k: 'om',     label: 'Faaliyet Kârı',   test: (r,f) => f.om != null && f.om > 0 },
  { k: 'roe',    label: 'ROE +',           test: (r,f) => f.roe != null && f.roe > 0 },
  { k: 'pe',     label: 'Makul F/K',       test: (r,f) => { const pe = r.pe != null ? r.pe : f.pe; return pe != null && pe > 0 && pe < 80; } },
  { k: 'mc',     label: 'Yeterli Büyüklük', test: (r,f) => { const mc = r.mc != null ? r.mc : f.mc; return mc != null && mc >= 100e6; } },
  { k: 'qeg',    label: 'Çeyrek Kâr ↑',    test: (r,f) => f.qeg != null && f.qeg > 0 },
  { k: 'liq',    label: 'Likit',           test: (r,f) => r.v >= 100000 || (r.av && r.v >= r.av * 0.5) },
  { k: 'y52',    label: 'Yıllık Pozitif',  test: (r,f) => r.y52 != null && r.y52 > 0 },
  { k: 'near52H', label: '52H Yakın',       test: (r,f) => r.wh && r.p != null && r.p >= r.wh * 0.85 },
];
function scoreRow(r) {
  const f = FUND[r.s] || {};
  let total = 0;
  const pass = CRITERIA.map(c => {
    const ok = !!c.test(r, f);
    if (ok) total++;
    return { k: c.k, label: c.label, ok };
  });
  return { score: total, max: CRITERIA.length, pass, f };
}

/* ============================================================
   SPARKLINE SVG
   ============================================================ */
function sparkSVG(arr) {
  if (!arr || arr.length < 2) return '<svg width="100%" height="36"></svg>';
  const min = Math.min(...arr), max = Math.max(...arr);
  const range = (max - min) || 1;
  const w = 200, h = 36;
  const pts = arr.map((v, i) => {
    const x = (i / (arr.length - 1)) * (w - 4) + 2;
    const y = h - 2 - ((v - min) / range) * (h - 4);
    return x.toFixed(1) + ',' + y.toFixed(1);
  }).join(' ');
  const last = arr[arr.length - 1], first = arr[0];
  const color = last >= first ? 'var(--up)' : 'var(--down)';
  const fill = last >= first ? 'rgba(52,211,153,.08)' : 'rgba(251,113,133,.08)';
  return `<svg width="100%" height="${h}" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
    <polygon points="2,${h} ${pts} ${w - 2},${h}" fill="${fill}"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linejoin="round"/>
  </svg>`;
}

/* ============================================================
   THEME CARDS — Computed stats per theme
   ============================================================ */
function themeStats(themeKey) {
  const sub = ROWS.filter(r => r.g === themeKey);
  if (!sub.length) return { count: 0, avg: 0, up: 0, down: 0, top: null };
  const valid = sub.filter(r => r.ch != null && !isNaN(r.ch));
  const avg = valid.length ? valid.reduce((s, r) => s + r.ch, 0) / valid.length : 0;
  const up = sub.filter(r => r.ch > 0).length;
  const down = sub.filter(r => r.ch < 0).length;
  const sorted = [...valid].sort((a, b) => b.ch - a.ch);
  const top = sorted[0] || null;
  return { count: sub.length, avg, up, down, top };
}

function renderThemes() {
  const el = document.getElementById('themeGrid');
  el.innerHTML = ['AI', 'BT', 'CE', 'QC'].map(key => {
    const t = THEMES[key];
    const s = themeStats(key);
    const active = st.selectedThemes.includes(key);
    const avgCls = s.avg >= 0 ? 'up' : 'down';
    const arrow = s.avg >= 0 ? '▲' : '▼';
    const topPct = s.top ? fmtPct(s.top.ch, 1) : '—';
    const topSym = s.top ? s.top.s : '';
    return `<button class="theme-card ${active ? 'active' : ''}" data-key="${key}" type="button">
      <span class="check">✓</span>
      <div class="emoji">${t.emoji}</div>
      <div class="name">${t.name}</div>
      <div class="count tabular">${s.count}</div>
      <div class="count-label">hisse</div>
      <div class="avg ${avgCls}">${arrow} ${fmtPct(s.avg, 1)}</div>
      <div class="top">★ ${topSym} <span class="pct">${topPct}</span></div>
      <div class="updown"><span class="u">${s.up} ↑</span><span class="d">${s.down} ↓</span></div>
    </button>`;
  }).join('');
  el.querySelectorAll('.theme-card').forEach(card => {
    card.onclick = () => toggleTheme(card.dataset.key);
  });
}

function toggleTheme(key) {
  const idx = st.selectedThemes.indexOf(key);
  if (idx >= 0) st.selectedThemes.splice(idx, 1);
  else st.selectedThemes.push(key);
  // Tema seçildiğinde reco aktif olamaz
  if (st.selectedThemes.length) st.selectedReco = null;
  save();
  render();
  // Smooth scroll to results if user just selected something
  if (st.selectedThemes.length) {
    setTimeout(() => {
      document.querySelector('.results').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 100);
  }
}

/* ============================================================
   RECOMMENDATIONS
   ============================================================ */
function recoFilter(key) {
  return ROWS.filter(r => {
    const f = FUND[r.s] || {};
    const sc = scoreRow(r);
    const ob = calcOverbought(r, f);
    const pe = r.pe != null ? r.pe : f.pe;

    if (key === 'value') {
      // Düşük F/K + büyüyen
      if (pe == null || pe <= 0 || pe > 25) return false;
      const growing = (f.rg != null && f.rg > 0) || (r.eps != null && r.eps > 0);
      return growing && sc.score >= 5;
    }
    if (key === 'momentum') {
      // 52H'ye yakın + son ay yükseliş
      if (!(r.wh && r.p != null && r.p >= r.wh * 0.85)) return false;
      return r.ch >= 0 || (r.y52 != null && r.y52 > 10);
    }
    if (key === 'safe') {
      // Skor 6+ + şişmemiş
      return sc.score >= 6 && ob.score <= 1;
    }
    return true;
  });
}

function renderRecos() {
  const el = document.getElementById('recoGrid');
  el.innerHTML = Object.keys(RECOS).map(key => {
    const r = RECOS[key];
    const matches = recoFilter(key).length;
    const active = st.selectedReco === key;
    return `<button class="reco-card ${active ? 'active' : ''}" data-reco="${key}" type="button">
      <div class="reco-icon">${r.icon}</div>
      <div class="reco-title">${r.title}</div>
      <div class="reco-desc">${r.desc}</div>
      <div class="reco-count"><strong>${matches}</strong> hisse →</div>
    </button>`;
  }).join('');
  el.querySelectorAll('.reco-card').forEach(card => {
    card.onclick = () => selectReco(card.dataset.reco);
  });
}

function selectReco(key) {
  if (st.selectedReco === key) {
    st.selectedReco = null;
  } else {
    st.selectedReco = key;
    st.selectedThemes = []; // reco seçildiğinde temalar sıfırlanır
  }
  save();
  render();
  setTimeout(() => {
    document.querySelector('.results').scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 100);
}

/* ============================================================
   RESULTS — filtered + sorted stocks
   ============================================================ */
function getFilteredRows() {
  let rows;
  if (st.selectedReco) {
    rows = recoFilter(st.selectedReco);
  } else if (st.selectedThemes.length) {
    rows = ROWS.filter(r => st.selectedThemes.includes(r.g));
  } else {
    rows = []; // hiçbir seçim yoksa boş
  }
  const sortKey = st.sort;
  rows.sort((a, b) => {
    if (sortKey === 'ch_desc') return (b.ch ?? -Infinity) - (a.ch ?? -Infinity);
    if (sortKey === 'ch_asc')  return (a.ch ?? Infinity) - (b.ch ?? Infinity);
    if (sortKey === 'mc_desc') {
      const am = a.mc ?? (FUND[a.s] || {}).mc ?? 0;
      const bm = b.mc ?? (FUND[b.s] || {}).mc ?? 0;
      return bm - am;
    }
    if (sortKey === 'score_desc') return scoreRow(b).score - scoreRow(a).score;
    if (sortKey === 'sym_asc')   return a.s.localeCompare(b.s);
    return 0;
  });
  return rows;
}

function renderResults() {
  const rows = getFilteredRows();
  const titleEl = document.getElementById('resultsTitle');
  const grid = document.getElementById('stockGrid');

  // Title
  let titleText = '';
  if (st.selectedReco) {
    const r = RECOS[st.selectedReco];
    titleText = `${r.icon} ${r.title}`;
  } else if (st.selectedThemes.length) {
    const names = st.selectedThemes.map(k => `${THEMES[k].emoji} ${THEMES[k].name}`);
    titleText = names.length === 1 ? names[0] : `${st.selectedThemes.length} tema`;
  } else {
    titleText = 'Bir tema veya öneri seç';
  }
  const validCh = rows.filter(r => r.ch != null && !isNaN(r.ch));
  const avg = validCh.length ? validCh.reduce((s,r)=>s+r.ch,0)/validCh.length : null;
  const avgBadge = avg != null
    ? `<span class="badge-avg ${avg>=0?'up':'down'}">${fmtPct(avg, 1)}</span>`
    : '';
  titleEl.innerHTML = `<span>${titleText}</span><span class="badge-count">${rows.length} hisse</span>${avgBadge}`;

  // Empty state
  if (!rows.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon">${st.selectedReco || st.selectedThemes.length ? '🔍' : '👆'}</div>
      <h3>${st.selectedReco || st.selectedThemes.length ? 'Eşleşen hisse yok' : 'Henüz seçim yapmadın'}</h3>
      <p>${st.selectedReco || st.selectedThemes.length ? 'Filtreleri gevşetmeyi dene.' : 'Yukarıdan bir veya birkaç tema seç, ya da akıllı öneri kartına tıkla.'}</p>
    </div>`;
    return;
  }

  grid.innerHTML = rows.map(r => stockCardHTML(r)).join('');
  grid.querySelectorAll('.stock-card').forEach(card => {
    card.onclick = () => openDetail(card.dataset.sym);
  });
}

function stockCardHTML(r) {
  const f = FUND[r.s] || {};

  const ob = calcOverbought(r, f);

  return `<div class="stock-card ${isPlaceholder ? 'placeholder' : ''}" data-sym="${r.s}" data-theme="${r.g}">

/* ============================================================
   DETAIL MODAL
   ============================================================ */
let _modalChart = null;
const _fundCache = {};
const _historyCache = {};

async function fetchFundamentals(sym) {
  if (_fundCache[sym]) return _fundCache[sym];
  try {
    const r = await fetch(`/api/fundamentals?sym=${encodeURIComponent(sym)}`, { cache: 'no-store' });
    if (!r.ok) return null;
    const data = await r.json();
    if (!data || data.error) return null;
    _fundCache[sym] = data;
    Object.assign(FUND[sym] = FUND[sym] || {}, data, { _live: true });
    return data;
  } catch (e) { return null; }
}
async function fetchHistory(sym) {
  if (_historyCache[sym]) return _historyCache[sym];
  try {
    const r = await fetch(`/api/history?sym=${encodeURIComponent(sym)}`, { cache: 'no-store' });
    if (!r.ok) return null;
    const data = await r.json();
    if (!data || data.error || !Array.isArray(data.closes)) return null;
    _historyCache[sym] = data;
    const row = ROWS.find(x => x.s === sym);
    if (row) row.cl = data.closes;
    return data;
  } catch (e) { return null; }
}

function openDetail(sym) {
  const r = ROWS.find(x => x.s === sym);
  if (!r) return;
  document.getElementById('modal').hidden = false;
  document.body.style.overflow = 'hidden';
  renderModal(sym);
  // Lazy fetch
  Promise.all([fetchFundamentals(sym), fetchHistory(sym)]).then(() => {
    renderModal(sym);
  });
}
function closeModal() {
  document.getElementById('modal').hidden = true;
  document.body.style.overflow = '';
  if (_modalChart) { _modalChart.destroy(); _modalChart = null; }
}

    </div>

      <span>${ctry}</span>
      ${web ? '<span>·</span>' + web : ''}
    </div>
  `;

  // Body
  document.getElementById('modalBody').innerHTML = `
    <div class="modal-grid">
      <div class="chart-box">
        <div class="chart-range" id="chartRange">
          <button data-range="1mo">1A</button>
          <button data-range="3mo">3A</button>
          <button data-range="6mo">6A</button>
          <button data-range="1y" class="active">1Y</button>
          <button data-range="max">MAX</button>
        </div>
        <div class="chart-canvas-wrap"><canvas id="modalChart"></canvas></div>
      </div>
      <div class="score-box">
        <div class="score-block">
          <h4>Temel Puan</h4>
          <div class="score-bar">${Array.from({length:10},(_,i)=>`<div class="seg ${i<sc.score?'on':''}"></div>`).join('')}</div>
          <div class="score-text">${sc.score}/10</div>
          <ul class="score-criteria">
            ${sc.pass.map(p => `<li class="${p.ok ? 'ok' : 'no'}">${p.label}</li>`).join('')}
          </ul>
        </div>
        <div class="score-block">
          <h4>Şişmişlik</h4>
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <span class="ob-dot ${ob.cls}" style="font-size:14px;font-weight:700"></span>
            <span style="font-weight:700">${ob.validCount === 0 ? 'Veri yok' : ob.score + '/4'}</span>
          </div>
          <ul class="score-criteria" style="font-size:11px">
            ${ob.flags.map(f => `<li class="${f.hot ? 'no' : (f.na ? 'no' : 'ok')}">${labelOb(f.k)}: ${f.na ? '—' : fmtObVal(f.k, f.val)}</li>`).join('')}
          </ul>

    <div class="kpi-grid">
      ${kpiTile('Piyasa Değ.', fmtMoney(r.mc ?? f.mc, r.c))}
      ${kpiTile('F/K (TTM)', (r.pe ?? f.pe) != null ? (r.pe ?? f.pe).toFixed(1) : '—')}
      ${kpiTile('İleri F/K', (r.fpe ?? f.fpe) != null ? (r.fpe ?? f.fpe).toFixed(1) : '—')}
      ${kpiTile('EPS', (r.eps ?? f.eps) != null ? '$' + (r.eps ?? f.eps).toFixed(2) : '—')}
      ${kpiTile('ROE', f.roe != null ? (f.roe * 100).toFixed(1) + '%' : '—')}
      ${kpiTile('Brüt Marj', f.gm != null ? (f.gm * 100).toFixed(1) + '%' : '—')}

        const d = await res.json();

function labelOb(k) {
  return ({ rsi: 'RSI', ma: 'Fiyat/200MA', pe: 'F/K', r3m: '3 ay getirisi' }[k]);
}
function fmtObVal(k, v) {
  if (v == null) return '—';
  if (k === 'rsi') return Math.round(v).toString();
  if (k === 'ma') return '+' + Math.round((v - 1) * 100) + '%';
  if (k === 'pe') return v.toFixed(1);
  if (k === 'r3m') return (v >= 0 ? '+' : '') + Math.round(v) + '%';
  return v;
}
function kpiTile(label, value) {
  return `<div class="kpi-tile"><div class="label">${label}</div><div class="value">${value}</div></div>`;
}

function quartersBlock(f) {
  const qr = (f.qr || []).slice(0, 4).reverse();
  if (!qr.length || !qr.some(q => q.n != null)) return '';
  const max = Math.max(...qr.map(q => Math.abs(q.n || 0)));
  return `<h3 class="section-h">💰 Çeyrek Net Kâr</h3>
  <div class="quarter-bars">
    ${qr.map(q => {
      const v = q.n;
      const h = max > 0 ? (Math.abs(v || 0) / max) * 100 : 0;
      const cls = (v || 0) >= 0 ? 'pos' : 'neg';
      return `<div class="q-bar">
        <div class="bar-wrap"><div class="bar ${cls}" style="height:${h}%"></div></div>
        <div class="val">${fmtMoney(v, 'USD')}</div>
        <div class="label">${(q.d || '').substring(0, 7)}</div>
      </div>`;
    }).join('')}
  </div>`;
}

function companyBlock(r, f) {
  const ceo = (f.off || []).find(o => /CEO|Chief Executive/i.test(o.t || ''));
  return `<h3 class="section-h">🏢 Şirket</h3>
  <div class="company-info">
    <div class="company-meta">
      ${ceo ? `<div class="row"><span class="l">CEO</span><span class="v">${ceo.n}</span></div>` : ''}
      ${f.emp ? `<div class="row"><span class="l">Çalışan</span><span class="v">${fmtNum(f.emp)}</span></div>` : ''}
      ${f.city ? `<div class="row"><span class="l">Şehir</span><span class="v">${f.city}, ${f.ctry || ''}</span></div>` : ''}
      ${f.ind ? `<div class="row"><span class="l">Sektör</span><span class="v">${f.ind}</span></div>` : ''}
    </div>
    ${f.biz ? `<p style="margin:0">${f.biz}</p>` : '<p style="color:var(--fg-muted);margin:0">Şirket bilgisi yükleniyor…</p>'}
  </div>`;
}

function drawChart(closes) {
  const ctx = document.getElementById('modalChart');
  if (!ctx) return;
  if (_modalChart) _modalChart.destroy();
  const n = closes.length;
  const labels = closes.map((_, i) => i);
  const isUp = closes[n - 1] >= closes[0];
  const lineColor = isUp ? 'rgba(52, 211, 153, 1)' : 'rgba(251, 113, 133, 1)';
  const fillColor = isUp ? 'rgba(52, 211, 153, 0.1)' : 'rgba(251, 113, 133, 0.1)';
  _modalChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: closes,
        borderColor: lineColor,
        backgroundColor: fillColor,
        fill: true,
        borderWidth: 2,
        tension: 0.2,
        pointRadius: 0,
        pointHoverRadius: 4,
        pointHoverBackgroundColor: lineColor,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 600 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: 'rgba(28, 25, 23, 0.95)',
          padding: 8,
          titleFont: { size: 11 },
          bodyFont: { size: 13, weight: 'bold' },
          callbacks: {
            title: () => '',
            label: (ctx) => '$' + ctx.parsed.y.toFixed(2),
          }
        }
      },
      scales: {
        x: { display: false },
        y: { display: true, ticks: { color: 'rgba(148,163,184,0.6)', font: { size: 10 } }, grid: { color: 'rgba(148,163,184,0.1)' } }
      }
    }
  });
}

/* ============================================================
   SEARCH OVERLAY
   ============================================================ */
function openSearch() {
  document.getElementById('searchOverlay').hidden = false;
  setTimeout(() => document.getElementById('searchInput').focus(), 50);
  renderSearchResults('');
}
function closeSearch() {
  document.getElementById('searchOverlay').hidden = true;
  document.getElementById('searchInput').value = '';
}
function renderSearchResults(q) {
  q = q.trim().toLowerCase();
  const all = ROWS;
  const matches = q ? all.filter(r => {
    return r.s.toLowerCase().includes(q) || (r.n || '').toLowerCase().includes(q);
  }).slice(0, 30) : all.slice(0, 12);
  const el = document.getElementById('searchResults');
  if (!matches.length) {
    el.innerHTML = '<div class="search-empty">Sonuç yok</div>';
    return;
  }
  el.innerHTML = matches.map(r => {
    const chCls = (r.ch ?? 0) >= 0 ? 'up' : 'down';
    return `<div class="search-result" data-sym="${r.s}">
      <span class="sr-sym">${r.s}</span>
      <span class="sr-name">${r.n || ''}</span>
      <span class="sr-price tabular">${fmtPrice(r.p, r.c)}</span>
      <span class="change ${chCls}" style="padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700">${fmtPct(r.ch, 1)}</span>
    </div>`;
  }).join('');
  el.querySelectorAll('.search-result').forEach(row => {
    row.onclick = () => { closeSearch(); openDetail(row.dataset.sym); };
  });
}

/* ============================================================
   THEME TOGGLE
   ============================================================ */
function applyTheme() {
  document.documentElement.dataset.theme = st.theme;
  document.getElementById('themeToggle').textContent = st.theme === 'dark' ? '☀' : '☾';
}
function toggleAppTheme() {
  st.theme = st.theme === 'dark' ? 'light' : 'dark';
  save();
  applyTheme();
}

/* ============================================================
   CSV EXPORT
   ============================================================ */
function exportCSV() {
  const rows = getFilteredRows();
  if (!rows.length) { alert('Önce bir tema veya öneri seç.'); return; }
  const head = ['Sembol','İsim','Tema','Fiyat','% Değişim','Hacim','Piyasa Değ.','F/K','EPS','52H %','Skor'];
  const lines = [head.join(',')];
  rows.forEach(r => {
    const f = FUND[r.s] || {};
    const sc = scoreRow(r);
    lines.push([
      r.s,
      '"' + (r.n || '').replace(/"/g, '') + '"',
      THEMES[r.g]?.name || r.g,
      r.p ?? '',
      r.ch ?? '',
      r.v ?? '',
      r.mc ?? f.mc ?? '',
      r.pe ?? f.pe ?? '',
      r.eps ?? f.eps ?? '',
      r.y52 ?? '',
      sc.score
    ].join(','));
  });
  const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `pro-hisse-nasdaq-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

/* ============================================================
   LIVE REFRESH (3 dk)
   ============================================================ */
async function refreshLive() {
  const lbl = document.getElementById('liveText');
  const badge = document.getElementById('liveBadge');
  badge.classList.remove('live');
  lbl.textContent = 'Yenileniyor…';
  try {
    const r = await fetch('/api/quotes?market=NASDAQ', { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    if (!d.rows || !d.rows.length) throw new Error('No rows');
    const fresh = Object.fromEntries(d.rows.map(x => [x.s, x]));
    let updated = 0, added = 0;
    // Update existing
    for (const row of ROWS) {
      const f = fresh[row.s];
      if (f) {
        Object.assign(row, {
          p: f.p, prev: f.prev, ch: f.ch, v: f.v,
          dh: f.dh, dl: f.dl, wh: f.wh, wl: f.wl,
          sp: f.sp || row.sp,
          mc: f.mc != null ? f.mc : row.mc,
          pe: f.pe != null ? f.pe : row.pe,
          fpe: f.fpe != null ? f.fpe : row.fpe,
          eps: f.eps != null ? f.eps : row.eps,
          y52: f.y52 != null ? f.y52 : row.y52,
          av: f.av != null ? f.av : row.av,
          n: (f.n && f.n !== f.s) ? f.n : (row.n || f.s),
          // m/g override etmiyoruz — local otorite
        });
        delete row._placeholder;
        updated++;
      }
    }
    // Push new
    const existing = new Set(ROWS.map(r => r.s));
    for (const f of d.rows) {
      if (!existing.has(f.s)) { ROWS.push(f); added++; }
    }
    badge.classList.add('live');
    const t = new Date(d.asOf).toLocaleTimeString('tr-TR');
    lbl.textContent = `Canlı · ${t}`;
    render();
  } catch (e) {
    lbl.textContent = 'Çevrimdışı';
    console.warn('refreshLive failed:', e);
  }
}

/* ============================================================
   MASTER RENDER
   ============================================================ */
function render() {
  document.getElementById('totalCount').textContent = ROWS.length;
  renderThemes();
  renderRecos();
  renderResults();
}

/* ============================================================
   EVENT WIRING
   ============================================================ */
document.getElementById('themeToggle').onclick = toggleAppTheme;
document.getElementById('csvBtn').onclick = exportCSV;
document.getElementById('searchTrigger').onclick = openSearch;
document.getElementById('searchInput').oninput = (e) => renderSearchResults(e.target.value);
document.getElementById('searchOverlay').onclick = (e) => { if (e.target.id === 'searchOverlay') closeSearch(); };
document.getElementById('modal').onclick = (e) => { if (e.target.id === 'modal') closeModal(); };
document.getElementById('modalClose').onclick = closeModal;
document.getElementById('sortSelect').onchange = (e) => { st.sort = e.target.value; save(); renderResults(); };
document.getElementById('sortSelect').value = st.sort;

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
    e.preventDefault();
    openSearch();
  }
  if (e.key === 'Escape') {
    if (!document.getElementById('searchOverlay').hidden) closeSearch();
    else if (!document.getElementById('modal').hidden) closeModal();
  }
});

/* ============================================================
   INIT
   ============================================================ */
applyTheme();
render();
refreshLive();
setInterval(refreshLive, 3 * 60 * 1000);
</script>
